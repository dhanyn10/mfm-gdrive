version: 2.1

jobs:
  build:
    docker:
      - image: cimg/node:20.11-browsers
    steps:
      - checkout

      - run:
          name: Enable pnpm
          command: |
            corepack enable
            corepack prepare pnpm@10.32.1 --activate
      - restore_cache:
          name: Restore pnpm cache
          keys:
            - pnpm-deps-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-deps-
      - run:
          name: Install dependencies
          command: pnpm install --frozen-lockfile
      - save_cache:
          name: Save pnpm cache
          key: pnpm-deps-{{ checksum "pnpm-lock.yaml" }}
          paths:
            - ~/.local/share/pnpm/store
      - run:
          name: Build Electron apps (Vite + React)
          command: |
            # Build for Linux since we are in a Linux environment
            pnpm run app:dist -- --linux
      - run:
          name: Put token.json
          # In the new setup, token.json is read from user data or app executable path.
          # The tests mock out the interactive auth, so we don't strictly need a valid token to pass the UI tests.
          # But we leave this here just in case the backend tests need it.
          command: echo $TOKEN > ./dist/linux-unpacked/token.json
      - run:
          name: Run WebdriverIO tests
          command: xvfb-run -a pnpm run wdio

workflows:
  version: 2
  build_and_test:
    jobs:
      - build